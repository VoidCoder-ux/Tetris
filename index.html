<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a1a">
    <title>Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --card: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --accent: #6c5ce7;
            --accent-glow: rgba(108,92,231,0.4);
            --text: #e8e8f0;
            --text-dim: rgba(255,255,255,0.4);
            --danger: #ff6b6b;
            --success: #51cf66;
            --gold: #ffd43b;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
            color: var(--text);
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(108,92,231,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(0,210,211,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(253,121,168,0.04) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-2%, 1%) rotate(1deg); }
            66% { transform: translate(1%, -1%) rotate(-1deg); }
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 420px;
            padding: 6px 10px;
            padding-top: env(safe-area-inset-top, 6px);
        }

        /* Top Stats Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 100%;
            gap: 6px;
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 8px 12px;
        }

        .stats-row {
            display: flex;
            gap: 14px;
            flex: 1;
            align-items: center;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .side-panels {
            display: flex;
            gap: 6px;
        }

        .mini-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 62px;
        }

        .mini-panel canvas {
            border-radius: 8px;
            margin-top: 3px;
        }

        /* Game Canvas Container */
        .canvas-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            box-shadow: 0 0 40px rgba(108,92,231,0.1), inset 0 0 30px rgba(0,0,0,0.3);
        }

        #game-canvas {
            display: block;
            background: rgba(10,10,26,0.9);
        }

        /* Combo / Clear notification */
        .notification {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            pointer-events: none;
            opacity: 0;
            z-index: 10;
            transition: none;
        }

        .notification.show {
            animation: notifPop 0.8s ease-out forwards;
        }

        @keyframes notifPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        /* Pause indicator */
        .pause-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,10,26,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .pause-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .pause-overlay .pause-icon {
            font-size: 48px;
            color: var(--accent);
        }

        .pause-overlay .pause-text {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Controls */
        .controls-area {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }

        .control-row {
            display: grid;
            gap: 6px;
        }

        .control-row.main {
            grid-template-columns: 1fr 1.3fr 1fr;
        }

        .control-row.actions {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .ctrl-btn {
            position: relative;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: var(--text);
            font-size: 24px;
            padding: 14px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
            overflow: hidden;
        }

        .ctrl-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(108,92,231,0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .ctrl-btn:active {
            transform: scale(0.93);
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .ctrl-btn:active::after {
            opacity: 1;
        }

        .ctrl-btn .btn-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .ctrl-btn.accent-btn {
            border-color: rgba(108,92,231,0.3);
            background: rgba(108,92,231,0.08);
        }

        .ctrl-btn.danger-btn {
            border-color: rgba(255,107,107,0.2);
            background: rgba(255,107,107,0.05);
        }

        .ctrl-btn.danger-btn:active {
            border-color: var(--danger);
            box-shadow: 0 0 16px rgba(255,107,107,0.3);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,10,26,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 16px;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay-logo {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(108,92,231,0.3));
        }

        .overlay-subtitle {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .overlay-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 16px 56px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: all 0.2s;
            margin-top: 8px;
        }

        .overlay-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .final-score-container {
            text-align: center;
        }

        .final-score-label {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .final-score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .high-score-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,212,59,0.1);
            border: 1px solid rgba(255,212,59,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: var(--gold);
            font-weight: 600;
        }

        .new-record {
            color: var(--gold);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .game-stats-summary {
            display: flex;
            gap: 20px;
            margin-top: 4px;
        }

        .game-stats-summary .stat-value {
            font-size: 20px;
        }

        /* Particles canvas */
        #particles-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        /* Sound toggle */
        .sound-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 200;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-dim);
        }

        .sound-toggle:active {
            transform: scale(0.9);
        }

        @media (max-height: 700px) {
            .ctrl-btn { padding: 10px 0; font-size: 20px; }
            .stat-value { font-size: 15px; }
            .overlay-logo { font-size: 42px; }
        }

        @media (max-height: 600px) {
            .ctrl-btn { padding: 8px 0; font-size: 18px; }
            .controls-area { gap: 4px; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<script>
// ==================== AUDIO ENGINE ====================
class AudioEngine {
    constructor() {
        this.enabled = true;
        this.ctx = null;
    }

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }

    play(type) {
        if (!this.enabled || !this.ctx) return;
        try {
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            switch(type) {
                case 'move':
                    osc.frequency.setValueAtTime(200, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                    break;
                case 'rotate':
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                    osc.start(now); osc.stop(now + 0.08);
                    break;
                case 'drop':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                    break;
                case 'clear':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.08);
                    osc.frequency.setValueAtTime(784, now + 0.16);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                    break;
                case 'tetris':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.06);
                    osc.frequency.setValueAtTime(784, now + 0.12);
                    osc.frequency.setValueAtTime(1047, now + 0.18);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                    break;
                case 'gameover':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
                case 'hold':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.setValueAtTime(500, now + 0.06);
                    gain.gain.setValueAtTime(0.07, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                    break;
                case 'levelup':
                    osc.type = 'sine';
                    [523,659,784,1047,784,1047].forEach((f,i) => {
                        osc.frequency.setValueAtTime(f, now + i*0.07);
                    });
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
            }
        } catch(e) {}
    }

    toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
    }
}

const audio = new AudioEngine();

// ==================== PARTICLES ====================
const particlesCanvas = document.getElementById('particles-canvas');
const pCtx = particlesCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
    particlesCanvas.width = window.innerWidth;
    particlesCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 3;
        this.life = 1;
        this.decay = 0.02 + Math.random() * 0.02;
        this.size = 3 + Math.random() * 4;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.15;
        this.life -= this.decay;
    }

    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }
}

function spawnParticles(worldX, worldY, color, count) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = rect.width / canvas.width;
    const scaleY = rect.height / canvas.height;
    const screenX = rect.left + worldX * scaleX;
    const screenY = rect.top + worldY * scaleY;
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(screenX, screenY, color));
    }
}

function updateParticles() {
    pCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
        p.update();
        p.draw(pCtx);
    }
}

// ==================== TETRIS ENGINE ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold-canvas');
const holdCtx = holdCanvas.getContext('2d');

const COLS = 10;
const ROWS = 20;
const BLOCK = 30;

const COLORS = {
    I: '#00d2d3', O: '#feca57', T: '#a29bfe',
    S: '#55efc4', Z: '#ff6b6b', J: '#74b9ff', L: '#fdcb6e'
};
const GLOW = {
    I: '#48dbfb', O: '#fff3a0', T: '#c8b6ff',
    S: '#7dffc4', Z: '#ffa0a0', J: '#a0c4ff', L: '#ffe0a0'
};
const DARK = {
    I: '#009999', O: '#b89a30', T: '#6c5ce7',
    S: '#2ecc71', Z: '#c0392b', J: '#2980b9', L: '#c8960a'
};

const SHAPES = {
    I: [[[0,0],[1,0],[2,0],[3,0]], [[0,0],[0,1],[0,2],[0,3]]],
    O: [[[0,0],[1,0],[0,1],[1,1]]],
    T: [[[0,0],[1,0],[2,0],[1,1]], [[0,0],[0,1],[0,2],[1,1]], [[1,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[1,2],[0,1]]],
    S: [[[1,0],[2,0],[0,1],[1,1]], [[0,0],[0,1],[1,1],[1,2]]],
    Z: [[[0,0],[1,0],[1,1],[2,1]], [[1,0],[1,1],[0,1],[0,2]]],
    J: [[[0,0],[0,1],[1,1],[2,1]], [[0,0],[1,0],[0,1],[0,2]], [[0,0],[1,0],[2,0],[2,1]], [[1,0],[1,1],[1,2],[0,2]]],
    L: [[[2,0],[0,1],[1,1],[2,1]], [[0,0],[0,1],[0,2],[1,2]], [[0,0],[1,0],[2,0],[0,1]], [[0,0],[1,0],[1,1],[1,2]]]
};

const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

let board, current, next, holdPiece, canHold;
let score, level, lines, combo, maxCombo;
let gameOver, paused, dropInterval, lastDrop, animationId;
let highScore = parseInt(localStorage.getItem('tetris-hs-v2') || '0');
let bag = [];

// 7-bag randomizer
function fillBag() {
    bag = [...PIECE_TYPES];
    for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
    }
}

function nextFromBag() {
    if (bag.length === 0) fillBag();
    return bag.pop();
}

function makePiece(type) {
    return { type, rotation: 0, x: Math.floor(COLS / 2) - 1, y: 0 };
}

function initBoard() {
    board = [];
    for (let r = 0; r < ROWS; r++) board.push(new Array(COLS).fill(null));
}

function getBlocks(piece) {
    const shape = SHAPES[piece.type][piece.rotation % SHAPES[piece.type].length];
    return shape.map(([dx, dy]) => ({ x: piece.x + dx, y: piece.y + dy }));
}

function isValid(piece) {
    for (const b of getBlocks(piece)) {
        if (b.x < 0 || b.x >= COLS || b.y >= ROWS) return false;
        if (b.y >= 0 && board[b.y][b.x]) return false;
    }
    return true;
}

function lockPiece() {
    const blocks = getBlocks(current);
    for (const b of blocks) {
        if (b.y < 0) { gameOver = true; return; }
        board[b.y][b.x] = current.type;
    }
    clearLines();
    current = next;
    next = makePiece(nextFromBag());
    canHold = true;
    if (!isValid(current)) gameOver = true;
}

function clearLines() {
    let cleared = 0;
    let clearedRows = [];
    for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(cell => cell !== null)) {
            clearedRows.push(r);
            // Spawn particles for each block in cleared row
            for (let c = 0; c < COLS; c++) {
                const color = COLORS[board[r][c]];
                spawnParticles(c * BLOCK + BLOCK/2, r * BLOCK + BLOCK/2, color, 4);
            }
            board.splice(r, 1);
            board.unshift(new Array(COLS).fill(null));
            cleared++;
            r++;
        }
    }

    if (cleared > 0) {
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        const points = [0, 100, 300, 500, 800];
        let pts = points[cleared] * level;
        if (combo > 1) pts += combo * 50 * level;
        score += pts;

        const prevLevel = level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(80, 800 - (level - 1) * 65);

        // Notifications
        if (cleared === 4) {
            showNotification('TETRIS!');
            audio.play('tetris');
        } else if (combo > 2) {
            showNotification(combo + 'x COMBO!');
            audio.play('clear');
        } else {
            audio.play('clear');
        }

        if (level > prevLevel) {
            showNotification('SEVIYE ' + level + '!');
            audio.play('levelup');
        }

        updateUI();
    } else {
        combo = 0;
    }
}

function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text;
    el.classList.remove('show');
    void el.offsetWidth; // reflow
    el.classList.add('show');
}

function getGhostY() {
    let gy = current.y;
    while (isValid({ ...current, y: gy + 1 })) gy++;
    return gy;
}

function moveLeft() {
    if (gameOver || paused) return;
    const moved = { ...current, x: current.x - 1 };
    if (isValid(moved)) { current = moved; audio.play('move'); }
}

function moveRight() {
    if (gameOver || paused) return;
    const moved = { ...current, x: current.x + 1 };
    if (isValid(moved)) { current = moved; audio.play('move'); }
}

function moveDown() {
    if (gameOver || paused) return;
    const moved = { ...current, y: current.y + 1 };
    if (isValid(moved)) { current = moved; score += 1; updateUI(); }
    else lockPiece();
}

function rotate() {
    if (gameOver || paused) return;
    const maxRot = SHAPES[current.type].length;
    const rotated = { ...current, rotation: (current.rotation + 1) % maxRot };
    for (const kick of [0, -1, 1, -2, 2]) {
        const kicked = { ...rotated, x: rotated.x + kick };
        if (isValid(kicked)) { current = kicked; audio.play('rotate'); return; }
    }
}

function hardDrop() {
    if (gameOver || paused) return;
    let dropped = 0;
    while (isValid({ ...current, y: current.y + 1 })) {
        current.y++;
        dropped++;
    }
    score += dropped * 2;
    // Particles on landing
    const blocks = getBlocks(current);
    for (const b of blocks) {
        spawnParticles(b.x * BLOCK + BLOCK/2, b.y * BLOCK + BLOCK/2, COLORS[current.type], 3);
    }
    audio.play('drop');
    lockPiece();
    updateUI();
}

function holdCurrentPiece() {
    if (gameOver || paused || !canHold) return;
    canHold = false;
    audio.play('hold');
    if (holdPiece) {
        const tmp = holdPiece;
        holdPiece = current.type;
        current = makePiece(tmp);
    } else {
        holdPiece = current.type;
        current = next;
        next = makePiece(nextFromBag());
    }
}

function togglePause() {
    if (gameOver) return;
    paused = !paused;
    document.getElementById('pause-overlay').classList.toggle('active', paused);
    document.getElementById('pause-label').innerHTML = paused ? '&#9654; Devam' : '&#9208; Duraklat';
}

// ==================== DRAWING ====================
function drawBlock(context, x, y, type, alpha = 1, blockSize = BLOCK) {
    const px = x * blockSize;
    const py = y * blockSize;
    const radius = blockSize > 20 ? 4 : 2;

    context.globalAlpha = alpha;

    // Main block with rounded rect
    context.fillStyle = COLORS[type];
    roundRect(context, px + 1, py + 1, blockSize - 2, blockSize - 2, radius);
    context.fill();

    // Inner highlight (top-left)
    context.fillStyle = GLOW[type];
    context.globalAlpha = alpha * 0.6;
    roundRect(context, px + 2, py + 2, blockSize - 6, blockSize * 0.35, radius);
    context.fill();

    // Inner shadow (bottom)
    context.fillStyle = DARK[type];
    context.globalAlpha = alpha * 0.3;
    context.fillRect(px + 3, py + blockSize * 0.65, blockSize - 6, blockSize * 0.3);

    // Shine dot
    context.globalAlpha = alpha * 0.5;
    context.fillStyle = '#fff';
    context.beginPath();
    context.arc(px + blockSize * 0.3, py + blockSize * 0.3, blockSize * 0.08, 0, Math.PI * 2);
    context.fill();

    context.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let c = 1; c < COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, canvas.height); ctx.stroke();
    }
    for (let r = 1; r < ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(canvas.width, r * BLOCK); ctx.stroke();
    }

    // Board
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);
        }
    }

    if (current && !gameOver) {
        // Ghost
        const ghostY = getGhostY();
        const ghostBlocks = getBlocks({ ...current, y: ghostY });
        for (const b of ghostBlocks) {
            if (b.y >= 0) {
                ctx.globalAlpha = 0.15;
                ctx.strokeStyle = COLORS[current.type];
                ctx.lineWidth = 1.5;
                roundRect(ctx, b.x * BLOCK + 2, b.y * BLOCK + 2, BLOCK - 4, BLOCK - 4, 3);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        // Current piece
        const blocks = getBlocks(current);
        for (const b of blocks) {
            if (b.y >= 0) drawBlock(ctx, b.x, b.y, current.type);
        }
    }

    drawMiniPiece(nextCtx, nextCanvas, next);
    drawMiniPiece(holdCtx, holdCanvas, holdPiece ? makePiece(holdPiece) : null);
}

function drawMiniPiece(context, cvs, piece) {
    context.clearRect(0, 0, cvs.width, cvs.height);
    if (!piece) return;
    const shape = SHAPES[piece.type][0];
    const minX = Math.min(...shape.map(s => s[0]));
    const maxX = Math.max(...shape.map(s => s[0]));
    const minY = Math.min(...shape.map(s => s[1]));
    const maxY = Math.max(...shape.map(s => s[1]));
    const w = maxX - minX + 1;
    const h = maxY - minY + 1;
    const size = 12;
    const ox = (cvs.width - w * size) / 2;
    const oy = (cvs.height - h * size) / 2;

    for (const [dx, dy] of shape) {
        const px = ox + (dx - minX) * size;
        const py = oy + (dy - minY) * size;
        context.fillStyle = COLORS[piece.type];
        roundRect(context, px + 0.5, py + 0.5, size - 1, size - 1, 2);
        context.fill();
        context.fillStyle = GLOW[piece.type];
        context.globalAlpha = 0.4;
        context.fillRect(px + 1, py + 1, size - 2, 2);
        context.globalAlpha = 1;
    }
}

function updateUI() {
    document.getElementById('score').textContent = score.toLocaleString();
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
    document.getElementById('combo').textContent = combo;
}

// ==================== GAME LOOP ====================
function gameLoop(timestamp) {
    if (gameOver) { endGame(); return; }
    if (!paused) {
        if (timestamp - lastDrop > dropInterval) {
            moveDown();
            lastDrop = timestamp;
        }
        draw();
    }
    updateParticles();
    animationId = requestAnimationFrame(gameLoop);
}

function startGame() {
    audio.init();
    initBoard();
    bag = [];
    fillBag();
    current = makePiece(nextFromBag());
    next = makePiece(nextFromBag());
    holdPiece = null;
    canHold = true;
    score = 0; level = 1; lines = 0; combo = 0; maxCombo = 0;
    gameOver = false; paused = false;
    dropInterval = 800; lastDrop = 0;
    particles = [];
    updateUI();
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
    document.getElementById('pause-overlay').classList.remove('active');
    document.getElementById('pause-label').innerHTML = '&#9208; Duraklat';
    if (animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(gameLoop);
}

function endGame() {
    audio.play('gameover');
    const isNewRecord = score > highScore;
    if (isNewRecord) {
        highScore = score;
        localStorage.setItem('tetris-hs-v2', highScore.toString());
    }
    document.getElementById('final-score').textContent = score.toLocaleString();
    document.getElementById('final-level').textContent = level;
    document.getElementById('final-lines').textContent = lines;
    document.getElementById('final-combo').textContent = maxCombo;

    const nr = document.getElementById('new-record');
    if (isNewRecord) nr.classList.remove('hidden');
    else nr.classList.add('hidden');

    if (highScore > 0) {
        document.getElementById('high-score-end').style.display = '';
        document.getElementById('hs-value-end').textContent = highScore.toLocaleString();
    }

    document.getElementById('gameover-overlay').classList.remove('hidden');
}

// ==================== CONTROLS ====================
function addBtn(id, fn) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); fn(); });
    el.addEventListener('click', e => { if (!e.isTrusted || e.detail === 0) return; fn(); });
}

addBtn('btn-left', moveLeft);
addBtn('btn-right', moveRight);
addBtn('btn-rotate', rotate);
addBtn('btn-down', moveDown);
addBtn('btn-drop', hardDrop);
addBtn('btn-hold', holdCurrentPiece);
addBtn('btn-pause', togglePause);

// Long press for continuous movement
function addLongPress(id, fn) {
    const el = document.getElementById(id);
    let interval = null;
    const start = () => { fn(); interval = setInterval(fn, 80); };
    const stop = () => { if (interval) { clearInterval(interval); interval = null; } };
    el.addEventListener('touchstart', e => { e.preventDefault(); start(); });
    el.addEventListener('touchend', stop);
    el.addEventListener('touchcancel', stop);
}

addLongPress('btn-left', moveLeft);
addLongPress('btn-right', moveRight);
addLongPress('btn-down', moveDown);

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'Escape') { togglePause(); return; }
    if (e.key === 'c' || e.key === 'C') { holdCurrentPiece(); return; }
    switch(e.key) {
        case 'ArrowLeft': moveLeft(); break;
        case 'ArrowRight': moveRight(); break;
        case 'ArrowDown': moveDown(); break;
        case 'ArrowUp': rotate(); break;
        case ' ': e.preventDefault(); hardDrop(); break;
    }
});

// Swipe on canvas
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;
    if (dt < 200 && Math.abs(dx) < 20 && Math.abs(dy) < 20) rotate();
    else if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) moveRight(); else if (dx < -30) moveLeft();
    } else {
        if (dy > 50) hardDrop(); else if (dy > 20) moveDown();
    }
});

// Sound toggle
const soundBtn = document.getElementById('sound-toggle');
soundBtn.addEventListener('click', () => {
    audio.init();
    const on = audio.toggle();
    soundBtn.innerHTML = on ? '&#128264;' : '&#128263;';
});

// Start / Restart
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Show high score on start
if (highScore > 0) {
    document.getElementById('high-score-start').style.display = '';
    document.getElementById('hs-value').textContent = highScore.toLocaleString();
}
</script>
